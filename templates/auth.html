<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sign In — PolyBot Platform</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{min-height:100vh;background:#06090f;display:flex;align-items:center;justify-content:center;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;padding:20px}
.bg{position:fixed;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(56,189,248,.08) 0%,transparent 60%);pointer-events:none}
.card{position:relative;background:#0d1117;border:1px solid #1e2a3a;border-radius:16px;width:100%;max-width:420px;overflow:hidden}
.card-header{padding:32px 32px 0;text-align:center}
.logo{font-size:32px;margin-bottom:8px}
.card-header h1{font-size:22px;font-weight:700;color:#f0f6fc;margin-bottom:4px}
.card-header p{color:#8b949e;font-size:14px}
.tabs{display:flex;margin:24px 32px 0;border-bottom:1px solid #1e2a3a}
.tab{flex:1;padding:12px;text-align:center;color:#8b949e;font-size:14px;font-weight:600;cursor:pointer;border-bottom:2px solid transparent;transition:.2s}
.tab.active{color:#38bdf8;border-bottom-color:#38bdf8}
.tab:hover{color:#f0f6fc}
.card-body{padding:24px 32px 32px}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:13px;color:#8b949e;margin-bottom:6px;font-weight:500}
.form-group input{width:100%;padding:10px 14px;background:#161b22;border:1px solid #1e2a3a;border-radius:8px;color:#f0f6fc;font-size:14px;outline:none;transition:.2s}
.form-group input:focus{border-color:#38bdf8;box-shadow:0 0 0 3px rgba(56,189,248,.1)}
.btn{width:100%;padding:12px;background:linear-gradient(135deg,#38bdf8,#6366f1);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;transition:.2s}
.btn:hover{opacity:.9;transform:translateY(-1px)}
.btn-secondary{background:transparent;border:1px solid #1e2a3a;color:#8b949e}
.btn-secondary:hover{border-color:#8b949e;color:#f0f6fc}
.hidden{display:none!important}
.flash{padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:16px;text-align:center}
.flash-error{background:#450a0a;color:#fca5a5;border:1px solid #7f1d1d}
.flash-success{background:#052e16;color:#86efac;border:1px solid #166534}
.note{font-size:12px;color:#4b5563;text-align:center;margin-top:16px}
</style>
</head>
<body>
<div class="bg"></div>
<div class="card">
    <div class="card-header">
        <div class="logo">🤖</div>
        <h1>PolyBot Platform</h1>
        <p>Automate your Polymarket trading</p>
    </div>
    
    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
    <div style="padding:0 32px">
    {% for cat,msg in messages %}
        <div class="flash flash-{{ 'error' if cat=='error' else 'success' }}">{{ msg }}</div>
    {% endfor %}
    </div>
    {% endif %}
    {% endwith %}
    
    <div class="tabs">
        <div class="tab active" onclick="switchTab('signin')">Sign In</div>
        <div class="tab" onclick="switchTab('signup')">Sign Up</div>
    </div>
    
    <div class="card-body">
        <!-- Sign In Form -->
        <form id="signinForm" method="post" action="/login">
            <input type="hidden" name="action" value="signin">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" placeholder="you@example.com" required autofocus>
            </div>
            <button type="submit" class="btn">Sign In</button>
        </form>
        
        <!-- Sign Up Form -->
        <form id="signupForm" class="hidden" method="post" action="/login">
            <input type="hidden" name="action" value="signup">
            <div class="form-group">
                <label>Your Name</label>
                <input type="text" name="name" placeholder="John Doe">
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" placeholder="you@example.com" required>
            </div>
            <button type="submit" class="btn">Create Account</button>
        </form>
    </div>
    
    <div class="note">No password needed — we use your wallet to verify identity</div>
</div>

<script>
function switchTab(tab) {
    document.querySelectorAll('.tab').forEach((t,i) => t.classList.remove('active'));
    document.querySelectorAll('.tab')[tab==='signin'?0:1].classList.add('active');
    document.getElementById('signinForm').classList.toggle('hidden', tab!=='signin');
    document.getElementById('signupForm').classList.toggle('hidden', tab!=='signup');
}
</script>
</body>
</html>
